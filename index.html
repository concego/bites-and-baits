<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Bites & Baits</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sprites SVG inline (hidden) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

    <!-- PEIXINHO — azul simples -->
    <symbol id="fish-peixinho" viewBox="0 0 64 32">
      <polygon points="0,8 12,16 0,24" fill="#4fc3f7"/>
      <ellipse cx="36" cy="16" rx="22" ry="11" fill="#29b6f6"/>
      <ellipse cx="34" cy="19" rx="16" ry="6" fill="#81d4fa"/>
      <polygon points="22,5 32,14 42,5" fill="#0288d1"/>
      <circle cx="52" cy="14" r="3" fill="white"/>
      <circle cx="53" cy="14" r="1.5" fill="#1a1a2e"/>
      <path d="M62 16 Q64 18 62 20" stroke="#1565c0" stroke-width="1.2" fill="none"/>
    </symbol>

    <!-- TILÁPIA — laranja listrada -->
    <symbol id="fish-tilapia" viewBox="0 0 72 36">
      <polygon points="0,6 14,18 0,30" fill="#ff7043"/>
      <line x1="7" y1="6" x2="7" y2="30" stroke="#bf360c" stroke-width="1"/>
      <ellipse cx="42" cy="18" rx="26" ry="14" fill="#ff8a65"/>
      <ellipse cx="40" cy="23" rx="18" ry="7" fill="#ffccbc"/>
      <line x1="28" y1="6" x2="26" y2="30" stroke="#e64a19" stroke-width="2" opacity="0.5"/>
      <line x1="38" y1="5" x2="36" y2="31" stroke="#e64a19" stroke-width="2" opacity="0.5"/>
      <line x1="48" y1="6" x2="47" y2="30" stroke="#e64a19" stroke-width="2" opacity="0.5"/>
      <polyline points="20,5 25,2 30,5 35,1 40,5 45,3 50,5" stroke="#bf360c" stroke-width="2" fill="none"/>
      <circle cx="60" cy="16" r="4" fill="white"/>
      <circle cx="61" cy="16" r="2" fill="#1a1a2e"/>
      <path d="M70 18 Q72 21 70 24" stroke="#bf360c" stroke-width="1.5" fill="none"/>
    </symbol>

    <!-- TRUTA — verde-azulada com pintas -->
    <symbol id="fish-truta" viewBox="0 0 80 34">
      <polygon points="0,4 16,17 0,30" fill="#26a69a"/>
      <ellipse cx="46" cy="17" rx="30" ry="13" fill="#4db6ac"/>
      <path d="M16 17 Q46 14 76 17" stroke="#00796b" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
      <ellipse cx="44" cy="22" rx="22" ry="7" fill="#b2dfdb"/>
      <circle cx="28" cy="13" r="2" fill="#e53935" opacity="0.8"/>
      <circle cx="36" cy="10" r="1.5" fill="#212121" opacity="0.6"/>
      <circle cx="44" cy="13" r="2" fill="#e53935" opacity="0.8"/>
      <circle cx="52" cy="11" r="1.5" fill="#212121" opacity="0.6"/>
      <circle cx="60" cy="14" r="2" fill="#e53935" opacity="0.8"/>
      <polygon points="24,5 38,12 52,5" fill="#00796b"/>
      <ellipse cx="34" cy="22" rx="7" ry="3" fill="#80cbc4" transform="rotate(-15,34,22)"/>
      <circle cx="70" cy="15" r="4" fill="white"/>
      <circle cx="71" cy="15" r="2" fill="#1a1a2e"/>
      <circle cx="71.5" cy="14.5" r="0.6" fill="white"/>
    </symbol>

    <!-- DOURADA — especial, brilhante -->
    <symbol id="fish-dourada" viewBox="0 0 88 40">
      <defs>
        <radialGradient id="grad-dourada" cx="50%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#fff176"/>
          <stop offset="60%" stop-color="#ffd600"/>
          <stop offset="100%" stop-color="#f57f17"/>
        </radialGradient>
      </defs>
      <polygon points="0,2 18,20 0,38" fill="#ffd600"/>
      <polygon points="2,10 18,20 2,30" fill="#fff176"/>
      <ellipse cx="52" cy="20" rx="32" ry="17" fill="url(#grad-dourada)"/>
      <path d="M24 18 Q30 12 36 18" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <path d="M34 14 Q40 8 46 14" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <path d="M44 12 Q50 6 56 12" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <path d="M30 24 Q36 18 42 24" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <path d="M40 22 Q46 16 52 22" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <path d="M50 20 Q56 14 62 20" stroke="#f9a825" stroke-width="1.2" fill="none"/>
      <ellipse cx="50" cy="28" rx="22" ry="8" fill="#fff9c4"/>
      <path d="M22 8 Q36 0 50 6 Q60 2 68 8" stroke="#f57f17" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <ellipse cx="40" cy="28" rx="9" ry="4" fill="#ffe082" transform="rotate(-20,40,28)"/>
      <circle cx="76" cy="17" r="5.5" fill="white"/>
      <circle cx="77" cy="17" r="3" fill="#1a1a2e"/>
      <circle cx="78" cy="15.5" r="1" fill="white"/>
      <path d="M84 19 Q88 22 84 26" stroke="#e65100" stroke-width="1.8" fill="none"/>
    </symbol>

    <!-- TUBARÃO — enorme, cinza -->
    <symbol id="fish-tubarao" viewBox="0 0 100 44">
      <polygon points="0,2 20,22 0,42" fill="#546e7a"/>
      <polygon points="4,8 20,22 4,36" fill="#78909c"/>
      <ellipse cx="58" cy="22" rx="38" ry="18" fill="#78909c"/>
      <ellipse cx="56" cy="30" rx="28" ry="9" fill="#eceff1"/>
      <polygon points="36,5 44,22 62,5" fill="#546e7a"/>
      <polygon points="38,26 58,34 40,38" fill="#607d8b"/>
      <polygon points="44,26 64,34 46,38" fill="#607d8b" opacity="0.5"/>
      <path d="M20 22 Q58 18 95 22" stroke="#455a64" stroke-width="1.5" fill="none"/>
      <circle cx="88" cy="19" r="5" fill="#1a1a2e"/>
      <circle cx="87" cy="18" r="1.5" fill="white" opacity="0.6"/>
      <path d="M95 22 Q100 27 95 32" stroke="#eceff1" stroke-width="2" fill="none"/>
      <line x1="96" y1="23" x2="99" y2="25" stroke="white" stroke-width="1.2"/>
      <line x1="97" y1="26" x2="100" y2="27" stroke="white" stroke-width="1.2"/>
      <line x1="96" y1="29" x2="99" y2="29" stroke="white" stroke-width="1.2"/>
    </symbol>

  </svg>

  <!-- Região aria-live: leitor de tela anuncia mudanças de estado -->
  <div id="announcer" aria-live="assertive" aria-atomic="true" class="sr-only"></div>

  <div id="app">

    <!-- Tela de início -->
    <div id="screen-start" class="screen active">
      <div class="logo">🎣</div>
      <h1>Bites &amp; Baits</h1>
      <p class="subtitle">Um jogo de pesca pelo acelerômetro</p>


      <button id="btn-start" class="btn-primary">Começar a pescar</button>
      <p class="hint">Segure o celular na vertical para jogar</p>
    </div>

    <!-- Tela de jogo -->
    <div id="screen-game" class="screen">

      <header class="game-header">
        <div class="score-box">
          <span class="score-label">Peixes</span>
          <span id="score" class="score-value">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">Melhor</span>
          <span id="best" class="score-value">0</span>
        </div>
      </header>

      <!-- Cena visual -->
      <div id="scene">
        <div id="sky"></div>
        <div id="water-surface"></div>
        <div id="water">
          <div id="fish-container" aria-hidden="true"></div>
          <div id="lure" aria-hidden="true"></div>
        </div>
        <div id="shore">
          <div id="fisher" aria-hidden="true">
            <div id="rod"></div>
            <div id="line"></div>
          </div>
        </div>
      </div>

      <!-- Painel de estado -->
      <div id="status-panel">
        <div id="state-label" role="status" aria-live="polite">Pronto para lançar</div>

        <!-- Barra de tensão (visível só durante a puxada) -->
        <div id="tension-container" class="hidden" aria-hidden="true">
          <div class="tension-label">Tensão da linha</div>
          <div id="tension-bar-bg">
            <div id="tension-bar"></div>
            <div id="tension-marker"></div>
          </div>
        </div>

        <!-- Indicador de inclinação -->
        <div id="tilt-indicator" aria-hidden="true">
          <div id="tilt-arrow">↕</div>
          <div id="tilt-text">Incline para lançar</div>
        </div>
      </div>

      <button id="btn-menu" class="btn-secondary">Menu</button>
    </div>

    <!-- Tela de resultado -->
    <div id="screen-result" class="screen">
      <div id="result-icon">
        <svg id="result-fish-svg" aria-hidden="true" width="140" height="70">
          <use id="result-fish-use" href="#fish-peixinho"/>
        </svg>
      </div>
      <h2 id="result-title">Peixe capturado!</h2>
      <p id="result-desc"></p>
      <div class="result-stats">
        <div class="stat">
          <span class="stat-label">Peixes hoje</span>
          <span id="result-score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Recorde</span>
          <span id="result-best" class="stat-value">0</span>
        </div>
      </div>
      <button id="btn-continue" class="btn-primary">Pescar de novo</button>
      <button id="btn-menu2" class="btn-secondary">Menu</button>
    </div>

  </div>

  <script src="audio.js"></script>
  <script src="sensors.js"></script>
  <script src="game.js"></script>
</body>
</html>
