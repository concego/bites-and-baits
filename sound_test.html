<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de Sons</title>
<style>
  body {
    background: #0a0f1e;
    color: #e0f0ff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    padding: 24px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 8px; }
  button {
    width: 280px;
    padding: 16px;
    font-size: 1rem;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #1a2a4a;
    color: #e0f0ff;
    border: 1px solid #2a4a7a;
    transition: background 0.2s;
  }
  button:hover { background: #2a3a6a; }
  button:active { background: #3a4a8a; }
</style>
</head>
<body>
<h1>Teste de Sons — Web Audio API</h1>

<button onclick="playWater()">Água / Ambiente</button>
<button onclick="playRowing()">Remada</button>
<button onclick="playFishBite()">Peixe mordendo</button>
<button onclick="playFishCatch()">Peixe fisgado</button>
<button onclick="playMonsterAppear()">Monstro aparece</button>
<button onclick="playMonsterChase()">Perseguição (5s)</button>
<button onclick="playDanger()">Perigo iminente</button>
<button onclick="stopAll()">Parar tudo</button>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let activeNodes = [];

function stopAll() {
  activeNodes.forEach(function(n) { try { n.stop(); } catch(e) {} });
  activeNodes = [];
}

function makeDistortionCurve(amount) {
  var samples = 256;
  var curve = new Float32Array(samples);
  for (var i = 0; i < samples; i++) {
    var x = (i * 2) / samples - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

function createReverb(duration) {
  var convolver = ctx.createConvolver();
  var rate = ctx.sampleRate;
  var length = rate * duration;
  var impulse = ctx.createBuffer(2, length, rate);
  for (var c = 0; c < 2; c++) {
    var data = impulse.getChannelData(c);
    for (var i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

function playWater() {
  stopAll();
  var bufferSize = ctx.sampleRate * 4;
  var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  var source = ctx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 400;
  filter.Q.value = 0.8;

  var lfo = ctx.createOscillator();
  lfo.frequency.value = 0.15;
  var lfoGain = ctx.createGain();
  lfoGain.gain.value = 150;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  var gain = ctx.createGain();
  gain.gain.value = 0.18;

  var reverb = createReverb(3);

  source.connect(filter);
  filter.connect(gain);
  gain.connect(reverb);
  reverb.connect(ctx.destination);

  lfo.start();
  source.start();
  activeNodes.push(source, lfo);
}

function playRowing() {
  var now = ctx.currentTime;

  var osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(120, now);
  osc.frequency.exponentialRampToValueAtTime(40, now + 0.15);

  var oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.6, now);
  oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);

  var bufferSize = Math.floor(ctx.sampleRate * 0.3);
  var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.15));
  }

  var noise = ctx.createBufferSource();
  noise.buffer = buffer;

  var noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 1.5;

  var noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.3, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

  osc.connect(oscGain);
  oscGain.connect(ctx.destination);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(ctx.destination);

  osc.start(now); osc.stop(now + 0.25);
  noise.start(now); noise.stop(now + 0.3);
}

function playFishBite() {
  var now = ctx.currentTime;

  var osc = ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, now);
  osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);

  var osc2 = ctx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(1800, now);
  osc2.frequency.exponentialRampToValueAtTime(900, now + 0.08);

  var gain = ctx.createGain();
  gain.gain.setValueAtTime(0.4, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  osc.connect(gain);
  osc2.connect(gain);
  gain.connect(ctx.destination);

  osc.start(now); osc.stop(now + 0.2);
  osc2.start(now); osc2.stop(now + 0.18);
}

function playFishCatch() {
  var now = ctx.currentTime;
  var notes = [440, 554, 659];

  notes.forEach(function(freq, i) {
    var osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;

    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now + i * 0.05);
    gain.gain.linearRampToValueAtTime(0.25, now + i * 0.05 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.5);

    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + i * 0.05);
    osc.stop(now + i * 0.05 + 0.6);
  });
}

function playMonsterAppear() {
  var now = ctx.currentTime;

  var osc1 = ctx.createOscillator();
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(40, now);
  osc1.frequency.linearRampToValueAtTime(25, now + 1.5);

  var osc2 = ctx.createOscillator();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(55, now);
  osc2.frequency.linearRampToValueAtTime(30, now + 1.5);

  var lfo = ctx.createOscillator();
  lfo.frequency.value = 6;
  var lfoGain = ctx.createGain();
  lfoGain.gain.value = 8;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);

  var distortion = ctx.createWaveShaper();
  distortion.curve = makeDistortionCurve(200);
  distortion.oversample = '4x';

  var gain = ctx.createGain();
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.5, now + 0.3);
  gain.gain.linearRampToValueAtTime(0.3, now + 1.2);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 2.5);

  var reverb = createReverb(2);

  osc1.connect(distortion);
  osc2.connect(distortion);
  distortion.connect(gain);
  gain.connect(reverb);
  reverb.connect(ctx.destination);

  lfo.start(now);
  osc1.start(now); osc1.stop(now + 2.5);
  osc2.start(now); osc2.stop(now + 2.5);
  lfo.stop(now + 2.5);
}

function playMonsterChase() {
  stopAll();
  var now = ctx.currentTime;
  var duration = 5;

  var drone = ctx.createOscillator();
  drone.type = 'sawtooth';
  drone.frequency.value = 55;

  var harm = ctx.createOscillator();
  harm.type = 'square';
  harm.frequency.value = 82;

  var lfo = ctx.createOscillator();
  lfo.frequency.setValueAtTime(2, now);
  lfo.frequency.linearRampToValueAtTime(5, now + duration);
  var lfoGain = ctx.createGain();
  lfoGain.gain.value = 0.2;
  lfo.connect(lfoGain);

  var masterGain = ctx.createGain();
  masterGain.gain.value = 0.35;
  lfoGain.connect(masterGain.gain);

  var distortion = ctx.createWaveShaper();
  distortion.curve = makeDistortionCurve(80);

  var reverb = createReverb(1.5);

  drone.connect(distortion);
  harm.connect(distortion);
  distortion.connect(masterGain);
  masterGain.connect(reverb);
  reverb.connect(ctx.destination);

  drone.start(now); drone.stop(now + duration);
  harm.start(now); harm.stop(now + duration);
  lfo.start(now); lfo.stop(now + duration);

  activeNodes.push(drone, harm, lfo);
}

function playDanger() {
  var now = ctx.currentTime;

  for (var i = 0; i < 3; i++) {
    (function(idx) {
      var t = now + idx * 0.22;
      var osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 180 + idx * 30;

      var gain = ctx.createGain();
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.2);
    })(i);
  }
}
</script>
</body>
</html>
